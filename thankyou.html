<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --navy:          #070E1C;
    --navy2:         #0B1628;
    --navy3:         #0F1E35;
    --gold:          #F5C842;
    --gold-dim:      rgba(245,200,66,0.08);
    --gold-border:   rgba(245,200,66,0.22);
    --green:         #00C853;
    --green-dim:     rgba(0,200,83,0.08);
    --green-border:  rgba(0,200,83,0.28);
    --orange:        #FF6B35;
    --orange-dim:    rgba(255,107,53,0.08);
    --orange-border: rgba(255,107,53,0.30);
    --red:           #EF4444;
    --red-dim:       rgba(239,68,68,0.08);
    --red-border:    rgba(239,68,68,0.30);
    --white:         #FFFFFF;
    --text:          #E2E8F0;
    --muted:         #94A3B8;
    --border:        rgba(255,255,255,0.08);
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── TOPBAR ─────────────────────────────── */
  .topbar {
    padding: 11px 20px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: 0.2px;
  }
  .topbar.green  { background: var(--green); }
  .topbar.orange { background: var(--orange); }
  .topbar.neutral{ background: var(--gold); }

  /* ── PROGRESS ────────────────────────────── */
  .progress-bar {
    background: var(--navy2);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .progress-inner { max-width: 600px; margin: 0 auto; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .progress-step {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .progress-step.done   { color: var(--green); }
  .progress-step.active { color: var(--gold); }
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 2px;
    transition: width 1.2s ease;
  }

  /* ── CONTAINER ───────────────────────────── */
  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 44px 24px 88px;
  }

  /* ── ICON CIRCLE ─────────────────────────── */
  .icon-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    margin: 0 auto 28px;
    animation: popIn 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .icon-circle.green  { background: var(--green-dim);  border: 3px solid var(--green);  }
  .icon-circle.orange { background: var(--orange-dim); border: 3px solid var(--orange); }
  .icon-circle.neutral{ background: var(--gold-dim);   border: 3px solid var(--gold);   }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── PAGE HEADER ─────────────────────────── */
  .page-header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    border-radius: 2px;
  }
  .status-tag.green   { background: var(--green-dim);   border: 1px solid var(--green-border);   color: var(--green); }
  .status-tag.orange  { background: var(--orange-dim);  border: 1px solid var(--orange-border);  color: var(--orange); }
  .status-tag.neutral { background: var(--gold-dim);    border: 1px solid var(--gold-border);    color: var(--gold); }

  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 46px);
    color: var(--white);
    line-height: 1.05;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .page-header h1 .accent-green  { color: var(--green); }
  .page-header h1 .accent-orange { color: var(--orange); }
  .page-header h1 .accent-gold   { color: var(--gold); }

  .body-msg {
    background: var(--navy2);
    border: 1px solid var(--border);
    padding: 18px 20px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.85;
    text-align: left;
    border-radius: 4px;
    margin-top: 8px;
  }
  .body-msg strong { color: var(--white); }

  /* ── CLIENT NAME HIGHLIGHT ───────────────── */
  .client-name-badge {
    display: inline-block;
    background: var(--gold-dim);
    border: 1px solid var(--gold-border);
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 4px 12px;
    border-radius: 2px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  /* ── CARDS ───────────────────────────────── */
  .card {
    padding: 22px 24px;
    margin-bottom: 18px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.35s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.green   { background: var(--green-dim);   border: 1px solid var(--green-border); }
  .card.green::before   { background: linear-gradient(90deg, var(--green), var(--gold)); }
  .card.gold    { background: var(--gold-dim);    border: 1px solid var(--gold-border); }
  .card.gold::before    { background: linear-gradient(90deg, var(--gold), #F0A020); }
  .card.orange  { background: var(--orange-dim);  border: 1px solid var(--orange-border); }
  .card.orange::before  { background: linear-gradient(90deg, var(--orange), var(--gold)); }
  .card.red     { background: var(--red-dim);     border: 1px solid var(--red-border); }
  .card.red::before     { background: linear-gradient(90deg, var(--red), var(--orange)); }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-label.green   { color: var(--green); }
  .card-label.gold    { color: var(--gold); }
  .card-label.orange  { color: var(--orange); }
  .card-label.red     { color: var(--red); }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── SUMMARY ROW ─────────────────────────── */
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 12px;
    flex-wrap: wrap;
  }
  .summary-row:last-child { border-bottom: none; padding-bottom: 0; }
  .summary-key   { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
  .summary-val   { font-size: 13px; font-weight: 700; color: var(--white); text-align: right; word-break: break-word; }
  .summary-val.green  { color: var(--green); }
  .summary-val.gold   { color: var(--gold); }
  .summary-val.orange { color: var(--orange); }

  /* ── STEPS LIST ──────────────────────────── */
  .steps-list { list-style: none; }
  .steps-list li {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .steps-list li:last-child { border-bottom: none; }
  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .step-num.green   { background: var(--green-dim);   color: var(--green);   border: 1px solid var(--green-border); }
  .step-num.orange  { background: var(--orange-dim);  color: var(--orange);  border: 1px solid var(--orange-border); }
  .step-num.neutral { background: var(--gold-dim);    color: var(--gold);    border: 1px solid var(--gold-border); }
  .steps-list li strong { color: var(--white); }

  /* ── BALANCE ROW ─────────────────────────── */
  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
    gap: 6px;
  }
  .balance-row:last-child { border-bottom: none; padding-bottom: 0; }
  .balance-label { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .balance-value { font-size: 15px; font-weight: 800; }
  .balance-value.gold   { color: var(--gold); }
  .balance-value.white  { color: var(--white); }
  .balance-value.orange { color: var(--orange); }

  /* ── SLOT RESERVE ────────────────────────── */
  .slot-box {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--green-dim);
    border: 1px solid var(--green-border);
    padding: 14px 18px;
    border-radius: 4px;
    margin-bottom: 18px;
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    animation: fadeUp 0.6s 0.45s ease both;
  }
  .slot-box .lock-icon { font-size: 22px; flex-shrink: 0; }

  /* ── COUNTDOWN ───────────────────────────── */
  .countdown-wrap {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.5s ease both;
  }
  .countdown-box {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--navy2);
    border: 1px solid var(--border);
    padding: 14px 24px;
    border-radius: 4px;
    font-size: 13px;
    color: var(--muted);
  }
  .countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    color: var(--gold);
    line-height: 1;
    min-width: 36px;
    text-align: center;
  }

  /* ── WHATSAPP BUTTON ─────────────────────── */
  .wa-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #25D366;
    color: var(--navy);
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 16px;
    padding: 20px 28px;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(37,211,102,0.35);
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 10px;
    text-decoration: none;
    animation: fadeUp 0.6s 0.55s ease both;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .wa-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .wa-btn:hover::before { transform: translateX(100%); }
  .wa-btn:hover { background: #1eba5a; transform: translateY(-2px); box-shadow: 0 12px 40px rgba(37,211,102,0.45); }

  .wa-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
    line-height: 1.7;
    animation: fadeUp 0.6s 0.65s ease both;
  }

  /* ── PULSE DOT ───────────────────────────── */
  .pulse-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--orange);
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 4px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* ── DIVIDER ─────────────────────────────── */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* ── RESPONSIVE ──────────────────────────── */
  @media(max-width: 480px) {
    .container { padding: 28px 16px 64px; }
    .card { padding: 18px 16px; }
    .countdown-box { padding: 12px 16px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar" class="topbar"></div>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-inner">
    <div class="progress-label">
      <span class="progress-step done">① Details Done</span>
      <span class="progress-step done">② Payment Sent</span>
      <span class="progress-step active">③ Confirmation</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" style="width:100%"></div>
    </div>
  </div>
</div>

<!-- Main content injected by JS -->
<div class="container" id="mainContainer"></div>

<script>
(function () {

  /* ══════════════════════════════════════════════════════
     PART 1 — READ CLIENT DETAILS
  ══════════════════════════════════════════════════════ */

  const urlParams     = new URLSearchParams(window.location.search);
  const urlPayment    = urlParams.get('payment');
  const urlName       = urlParams.get('name');
  const urlPhone      = urlParams.get('phone');
  const urlPackage    = urlParams.get('package');
  const urlAmount     = urlParams.get('amount');
  const urlID         = urlParams.get('id');

  const ssPayment     = sessionStorage.getItem('ggs_payment');
  const ssName        = sessionStorage.getItem('ggs_name');
  const ssPhone       = sessionStorage.getItem('ggs_phone');
  const ssPackage     = sessionStorage.getItem('ggs_package');
  const ssAmount      = sessionStorage.getItem('ggs_amount');
  const ssID          = sessionStorage.getItem('ggs_id');

  // Clear sessionStorage after reading
  ['ggs_payment','ggs_name','ggs_phone','ggs_package','ggs_amount','ggs_id']
    .forEach(k => sessionStorage.removeItem(k));

  // Priority: URL params first (bank), then sessionStorage (Flutterwave), then fallback
  let paymentType, clientName, clientPhone, clientPackage, clientAmount, clientID, dataSource;

  if (urlPayment) {
    paymentType   = urlPayment;
    clientName    = urlName    || 'Client';
    clientPhone   = urlPhone   || '—';
    clientPackage = urlPackage || 'Standard Package';
    clientAmount  = urlAmount  || '₦180,000';
    clientID      = urlID      || '—';
    dataSource    = 'url';
  } else if (ssPayment) {
    paymentType   = ssPayment;
    clientName    = ssName    || 'Client';
    clientPhone   = ssPhone   || '—';
    clientPackage = ssPackage || 'Standard Package';
    clientAmount  = ssAmount  || '₦180,000';
    clientID      = ssID      || '—';
    dataSource    = 'session';
  } else {
    paymentType   = 'fallback';
    clientName    = 'Client';
    clientPhone   = '—';
    clientPackage = '—';
    clientAmount  = '—';
    clientID      = '—';
    dataSource    = 'none';
  }

  // Normalise amount display — ensure ₦ prefix
  function formatAmount(amt) {
    if (!amt || amt === '—') return '—';
    const s = String(amt).trim();
    return s.startsWith('₦') ? s : '₦' + s;
  }
  clientAmount = formatAmount(clientAmount);

  /* ══════════════════════════════════════════════════════
     PART 2 — FIRE FACEBOOK PIXEL PURCHASE
  ══════════════════════════════════════════════════════ */

  function getPixelValue() {
    if (paymentType === 'full')  return 180000;
    if (paymentType === 'split') return 100000;
    if (paymentType === 'bank') {
      const raw = String(clientAmount).replace(/[^\d]/g, '');
      if (raw.includes('180000') || raw === '180000') return 180000;
      if (raw.includes('100000') || raw === '100000') return 100000;
      return 180000;
    }
    return 100000; // fallback
  }

  if (typeof fbq !== 'undefined' && paymentType !== 'fallback') {
    fbq('track', 'Purchase', {
      currency: 'NGN',
      value: getPixelValue()
    });
  }

  /* ══════════════════════════════════════════════════════
     HELPERS
  ══════════════════════════════════════════════════════ */

  const WA_NUM = '2348106334849';

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function buildWaUrl(msg) {
    return `https://wa.me/${WA_NUM}?text=${encodeURIComponent(msg)}`;
  }

  function stepsHtml(steps, colorClass) {
    return steps.map((s, i) => `
      <li>
        <span class="step-num ${colorClass}">${i + 1}</span>
        <span>${s}</span>
      </li>`).join('');
  }

  function summaryCard(colorClass, labelText, rows) {
    const rowsHtml = rows.map(([key, val, valClass]) => `
      <div class="summary-row">
        <span class="summary-key">${esc(key)}</span>
        <span class="summary-val ${valClass || ''}">${val}</span>
      </div>`).join('');
    return `
      <div class="card ${colorClass}">
        <div class="card-label ${colorClass}">${labelText}</div>
        ${rowsHtml}
      </div>`;
  }

  /* ══════════════════════════════════════════════════════
     PART 3 — BUILD JOURNEYS
  ══════════════════════════════════════════════════════ */

  let html        = '';
  let topbarClass = 'green';
  let topbarText  = '';
  let waUrl       = '';
  let waLabel     = 'Send Payment Confirmation to Richard';
  let waNoteText  = 'send your confirmation so Richard can start your setup immediately';

  /* ────────────────────────────────────────────────────
     JOURNEY 1 — Full Payment ₦180,000 Flutterwave
  ──────────────────────────────────────────────────── */
  if (paymentType === 'full') {
    topbarClass = 'green';
    topbarText  = '🎉 Full Payment Confirmed — GGS Global | Setup Begins Now';

    const waMsg = `Hi Richard ✅ I just completed full payment for my PayPal setup.\n\nHere are my details:\nFull Name: ${clientName}\nPhone: ${clientPhone}\nPackage: ${clientPackage}\nPayment Method: Flutterwave\nAmount Paid: ${clientAmount}\n\nPlease confirm my slot and begin my setup immediately. Thank you 🙏`;
    waUrl = buildWaUrl(waMsg);
    waLabel = 'Send Payment Confirmation to Richard';
    waNoteText = 'send your confirmation so Richard can start your setup immediately';

    html = `
      <div class="icon-circle green">✅</div>

      <div class="page-header">
        <div class="client-name-badge">👤 ${esc(clientName)}</div>
        <div class="status-tag green">✅ Payment Confirmed</div>
        <h1>PAYMENT CONFIRMED<br><span class="accent-green">WELCOME TO GGS GLOBAL</span></h1>
        <div class="body-msg">
          Thank you <strong>${esc(clientName)}</strong> — your full payment of <strong>${esc(clientAmount)}</strong> has been received and confirmed automatically.<br>
          Your PayPal setup slot is <strong>officially locked.</strong> Richard begins your setup immediately.<br>
          <strong>Expected delivery: within 72 hours from now.</strong>
        </div>
      </div>

      ${summaryCard('green', '📋 Order Summary', [
        ['Name',           `<strong>${esc(clientName)}</strong>`,    'white'],
        ['Phone',          esc(clientPhone),                         ''],
        ['Package',        esc(clientPackage),                       ''],
        ['Amount Paid',    `<strong>${esc(clientAmount)}</strong>`,   'gold'],
        ['Payment Method', 'Flutterwave',                            ''],
        ['Status',         '✅ Payment Confirmed',                   'green'],
      ])}

      <div class="card green">
        <div class="card-label green">📋 What Happens Next</div>
        <ul class="steps-list">
          ${stepsHtml([
            'Richard receives your payment confirmation <strong>automatically</strong>',
            'Your setup begins within the <strong>next few hours</strong>',
            'You receive your completed account details via <strong>WhatsApp within 72 hours</strong>',
            'Richard remains personally available on WhatsApp for <strong>30 days after delivery</strong>'
          ], 'green')}
        </ul>
      </div>`;
  }

  /* ────────────────────────────────────────────────────
     JOURNEY 2 — Split Payment ₦100,000 Flutterwave
  ──────────────────────────────────────────────────── */
  else if (paymentType === 'split') {
    topbarClass = 'green';
    topbarText  = '✅ Split Payment Confirmed — GGS Global | Setup Begins Now';

    const waMsg = `Hi Richard ✅ I just completed split payment for my PayPal setup.\n\nHere are my details:\nFull Name: ${clientName}\nPhone: ${clientPhone}\nPackage: ${clientPackage}\nPayment Method: Flutterwave\nAmount Paid: ${clientAmount}\nRemaining Balance: ₦80,000 — to be paid before delivery\n\nPlease confirm my slot and begin my setup immediately. Thank you 🙏`;
    waUrl = buildWaUrl(waMsg);
    waLabel = 'Send Payment Confirmation to Richard';
    waNoteText = 'send your confirmation so Richard can start your setup immediately';

    html = `
      <div class="icon-circle green">✅</div>

      <div class="page-header">
        <div class="client-name-badge">👤 ${esc(clientName)}</div>
        <div class="status-tag green">✅ Split Payment Confirmed</div>
        <h1>SPLIT PAYMENT CONFIRMED<br><span class="accent-green">SETUP BEGINS NOW</span></h1>
        <div class="body-msg">
          Thank you <strong>${esc(clientName)}</strong> — your first payment of <strong>${esc(clientAmount)}</strong> has been received and confirmed.<br>
          Your setup slot is <strong>locked</strong> and Richard begins immediately.<br>
          <strong>Your remaining balance of ₦80,000 is due before final account delivery.</strong>
        </div>
      </div>

      ${summaryCard('green', '📋 Order Summary', [
        ['Name',           `<strong>${esc(clientName)}</strong>`,    'white'],
        ['Phone',          esc(clientPhone),                         ''],
        ['Package',        esc(clientPackage),                       ''],
        ['Amount Paid',    `<strong>${esc(clientAmount)}</strong>`,   'gold'],
        ['Payment Method', 'Flutterwave',                            ''],
        ['Status',         '✅ First Payment Confirmed',             'green'],
      ])}

      <div class="card gold">
        <div class="card-label gold">💰 Remaining Balance Due</div>
        <div class="balance-row">
          <span class="balance-label">Balance Due</span>
          <span class="balance-value gold">₦80,000</span>
        </div>
        <div class="balance-row">
          <span class="balance-label">Due</span>
          <span class="balance-value white">Before final delivery</span>
        </div>
        <div class="balance-row">
          <span class="balance-label">Pay via PalmPay</span>
          <span class="balance-value white">8142717585 — Richard Ojukwu</span>
        </div>
        <div class="balance-row">
          <span class="balance-label">Or Flutterwave</span>
          <span class="balance-value white">flutterwave.com/pay/halfpay</span>
        </div>
      </div>

      <div class="card green">
        <div class="card-label green">📋 What Happens Next</div>
        <ul class="steps-list">
          ${stepsHtml([
            'Setup begins <strong>immediately</strong> on receipt of first payment',
            'Richard contacts you via WhatsApp <strong>throughout the process</strong>',
            'Remaining <strong>₦80,000</strong> is collected before your account is handed over',
            'Full delivery within <strong>72 hours of first payment</strong>'
          ], 'green')}
        </ul>
      </div>`;
  }

  /* ────────────────────────────────────────────────────
     JOURNEY 3 — Direct Bank Transfer
  ──────────────────────────────────────────────────── */
  else if (paymentType === 'bank') {
    topbarClass = 'orange';
    topbarText  = '⏳ Order Received — GGS Global | Verifying Your Payment Now';

    const waMsg = `Hi Richard ✅ I just submitted my PayPal setup order and uploaded my bank transfer receipt.\n\nHere are my details:\nFull Name: ${clientName}\nPhone: ${clientPhone}\nPackage: ${clientPackage}\nPayment Method: Direct Bank Transfer — PalmPay\nAmount Transferred: ${clientAmount}\nReceipt: Uploaded on order form ✅\n\nPlease verify my payment and confirm my setup slot. Thank you 🙏`;
    waUrl = buildWaUrl(waMsg);
    waLabel = 'Message Richard to Confirm Your Receipt';
    waNoteText = 'message Richard so he can verify your transfer and lock your slot immediately';

    html = `
      <div class="icon-circle orange">📩</div>

      <div class="page-header">
        <div class="client-name-badge">👤 ${esc(clientName)}</div>
        <div class="status-tag orange"><span class="pulse-dot"></span>Receipt Received</div>
        <h1>ORDER RECEIVED<br><span class="accent-orange">VERIFYING YOUR PAYMENT</span></h1>
        <div class="body-msg">
          Thank you <strong>${esc(clientName)}</strong> — your order details and payment receipt have been successfully received.<br>
          Richard is manually verifying your bank transfer of <strong>${esc(clientAmount)}</strong> in our PalmPay account right now.<br>
          <strong>This typically takes under 30 minutes.</strong>
        </div>
      </div>

      ${summaryCard('orange', '📋 Order Summary', [
        ['Name',              `<strong>${esc(clientName)}</strong>`,             'white'],
        ['Phone',             esc(clientPhone),                                  ''],
        ['Package',           esc(clientPackage),                                ''],
        ['Amount Transferred',`<strong>${esc(clientAmount)}</strong>`,            'gold'],
        ['Payment Method',    'Direct Bank Transfer — PalmPay',                  ''],
        ['Status',            '⏳ Verification In Progress',                     'orange'],
      ])}

      <div class="card orange">
        <div class="card-label orange">🔍 What Is Happening Right Now</div>
        <ul class="steps-list">
          ${stepsHtml([
            'Your receipt has been received and logged <strong>✅</strong>',
            'Richard is verifying your PalmPay transfer <strong>now</strong>',
            'You will receive <strong>WhatsApp confirmation within 30 minutes</strong>',
            'Setup begins <strong>immediately after payment is verified</strong>',
            'Full delivery within <strong>72 hours of verification</strong>'
          ], 'orange')}
        </ul>
      </div>

      <div class="card red">
        <div class="card-label red">⚠️ Important Notice</div>
        <p style="font-size:14px; color:var(--text); line-height:1.7;">
          If you uploaded an <strong style="color:#fff;">incorrect receipt</strong> — send your correct receipt directly to WhatsApp:
          <strong style="color:#fff;">+2348106334849</strong> immediately to avoid delays.
        </p>
      </div>

      <div class="slot-box">
        <span class="lock-icon">🔒</span>
        <span>Your slot is reserved for the next <strong>2 hours</strong> while verification is completed.</span>
      </div>`;
  }

  /* ────────────────────────────────────────────────────
     FALLBACK — No parameters detected
  ──────────────────────────────────────────────────── */
  else {
    topbarClass = 'neutral';
    topbarText  = '✅ Order Received — GGS Global | Thank You';

    const waMsg = `Hi Richard ✅ I just completed my PayPal setup order. Please confirm my slot and next steps. Thank you 🙏`;
    waUrl = buildWaUrl(waMsg);
    waLabel = 'Contact Richard on WhatsApp';
    waNoteText = 'Richard will confirm your slot and send you next steps';

    html = `
      <div class="icon-circle neutral">✅</div>

      <div class="page-header">
        <div class="status-tag neutral">✅ Order Received</div>
        <h1>ORDER RECEIVED<br><span class="accent-gold">THANK YOU</span></h1>
        <div class="body-msg">
          Your order has been received.<br>
          Richard will contact you on WhatsApp shortly to confirm your setup slot and payment details.
        </div>
      </div>

      <div class="card gold">
        <div class="card-label gold">📋 What Happens Next</div>
        <ul class="steps-list">
          ${stepsHtml([
            'Richard reviews your order and <strong>contacts you on WhatsApp</strong>',
            'Your setup slot is confirmed once payment is <strong>verified</strong>',
            'Full delivery within <strong>72 hours of confirmation</strong>',
            'Richard remains available on WhatsApp for <strong>30 days after delivery</strong>'
          ], 'neutral')}
        </ul>
      </div>`;
  }

  /* ══════════════════════════════════════════════════════
     PART 4 — INJECT TOPBAR
  ══════════════════════════════════════════════════════ */
  const topbarEl = document.getElementById('topbar');
  topbarEl.className = `topbar ${topbarClass}`;
  topbarEl.textContent = topbarText;

  /* ══════════════════════════════════════════════════════
     PART 4 — INJECT COUNTDOWN + WA BUTTON + FULL HTML
  ══════════════════════════════════════════════════════ */
  const countdownLabel = paymentType === 'bank'
    ? 'Redirecting you to WhatsApp to complete verification in'
    : 'Redirecting you to WhatsApp to complete your confirmation in';

  html += `
    <hr class="section-divider">

    <div class="countdown-wrap">
      <div class="countdown-box">
        <span>${countdownLabel}</span>
        <span class="countdown-num" id="cdNum">5</span>
        <span>seconds…</span>
      </div>
    </div>

    <a href="${waUrl}" class="wa-btn" id="waBtn">
      <span style="font-size:22px;">💬</span>
      ${waLabel}
    </a>

    <p class="wa-note">
      Opens WhatsApp — ${waNoteText}<br>
      WhatsApp: +234 810 633 4849
    </p>`;

  document.getElementById('mainContainer').innerHTML = html;

  /* ══════════════════════════════════════════════════════
     COUNTDOWN & AUTO-REDIRECT
  ══════════════════════════════════════════════════════ */
  let secs  = 5;
  const cdEl = document.getElementById('cdNum');

  const timer = setInterval(() => {
    secs--;
    if (cdEl) cdEl.textContent = secs;
    if (secs <= 0) {
      clearInterval(timer);
      window.location.href = waUrl;
    }
  }, 1000);

  // Clear timer if user taps WA button manually
  const waBtnEl = document.getElementById('waBtn');
  if (waBtnEl) {
    waBtnEl.addEventListener('click', () => clearInterval(timer));
  }

})();
</script>
