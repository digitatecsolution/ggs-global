<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed — GGS Global</title>

<!-- Facebook Pixel -->
<script>

n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';

<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=924866965267790&ev=PageView&noscript=1"/></noscript>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #070E1C;
    --navy2: #0B1628;
    --navy3: #0F1E35;
    --gold: #F5C842;
    --gold-dim: rgba(245,200,66,0.08);
    --gold-border: rgba(245,200,66,0.2);
    --green: #00C853;
    --green-dim: rgba(0,200,83,0.08);
    --green-border: rgba(0,200,83,0.25);
    --orange: #FF6B35;
    --orange-dim: rgba(255,107,53,0.08);
    --orange-border: rgba(255,107,53,0.25);
    --blue: #3B82F6;
    --blue-dim: rgba(59,130,246,0.1);
    --white: #FFFFFF;
    --text: #E2E8F0;
    --muted: #94A3B8;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    padding: 10px 20px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--navy);
  }
  .topbar.green { background: var(--green); }
  .topbar.orange { background: var(--orange); }

  /* PROGRESS */
  .progress-bar {
    background: var(--navy2);
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }
  .progress-inner { max-width: 600px; margin: 0 auto; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-step {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .progress-step.done { color: var(--green); }
  .progress-step.active { color: var(--gold); }
  .progress-track { height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold)); border-radius: 2px; transition: width 1s ease; }

  /* CONTAINER */
  .container { max-width: 600px; margin: 0 auto; padding: 40px 24px 80px; }

  /* ICON CIRCLE */
  .icon-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px;
    margin: 0 auto 28px;
    animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  .icon-circle.green { background: var(--green-dim); border: 3px solid var(--green); }
  .icon-circle.orange { background: var(--orange-dim); border: 3px solid var(--orange); }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  /* PAGE HEADER */
  .page-header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.6s 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 18px;
    border-radius: 2px;
  }
  .status-tag.green { background: var(--green-dim); border: 1px solid var(--green-border); color: var(--green); }
  .status-tag.orange { background: var(--orange-dim); border: 1px solid var(--orange-border); color: var(--orange); }

  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(30px, 7vw, 48px);
    color: var(--white);
    line-height: 1.05;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .page-header h1 .accent-green { color: var(--green); }
  .page-header h1 .accent-orange { color: var(--orange); }

  .page-header .body-msg {
    background: var(--navy2);
    border: 1px solid var(--border);
    padding: 18px 20px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    text-align: left;
    border-radius: 4px;
    margin-top: 8px;
  }
  .page-header .body-msg strong { color: var(--white); }

  /* CARDS */
  .card {
    padding: 24px;
    margin-bottom: 20px;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.35s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card.green { background: var(--green-dim); border: 1px solid var(--green-border); }
  .card.green::before { background: linear-gradient(90deg, var(--green), var(--gold)); }
  .card.gold { background: var(--gold-dim); border: 1px solid var(--gold-border); }
  .card.gold::before { background: linear-gradient(90deg, var(--gold), #F0A020); }
  .card.orange { background: var(--orange-dim); border: 1px solid var(--orange-border); }
  .card.orange::before { background: linear-gradient(90deg, var(--orange), var(--gold)); }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-label.green { color: var(--green); }
  .card-label.gold { color: var(--gold); }
  .card-label.orange { color: var(--orange); }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* STEPS LIST */
  .steps-list { list-style: none; }
  .steps-list li {
    display: flex;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
  }
  .steps-list li:last-child { border-bottom: none; }
  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    flex-shrink: 0;
  }
  .step-num.green { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
  .step-num.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange-border); }
  .steps-list li strong { color: var(--white); }

  /* BALANCE BOX */
  .balance-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
    gap: 6px;
  }
  .balance-row:last-child { border-bottom: none; padding-bottom: 0; }
  .balance-label { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .balance-value { font-size: 15px; font-weight: 800; }
  .balance-value.gold { color: var(--gold); }
  .balance-value.white { color: var(--white); }

  /* COUNTDOWN */
  .countdown-wrap {
    text-align: center;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.5s ease both;
  }
  .countdown-box {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--navy2);
    border: 1px solid var(--border);
    padding: 14px 24px;
    border-radius: 4px;
    font-size: 14px;
    color: var(--muted);
  }
  .countdown-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
    min-width: 32px;
    text-align: center;
  }

  /* WHATSAPP BUTTON */
  .wa-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #25D366;
    color: var(--navy);
    font-family: 'Manrope', sans-serif;
    font-weight: 900;
    font-size: 16px;
    padding: 20px 28px;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(37,211,102,0.35);
    transition: all 0.2s;
    width: 100%;
    margin-bottom: 10px;
    text-decoration: none;
    animation: fadeUp 0.6s 0.55s ease both;
    position: relative;
    overflow: hidden;
  }
  .wa-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.15) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .wa-btn:hover::before { transform: translateX(100%); }
  .wa-btn:hover { background: #20C05A; transform: translateY(-2px); }

  .wa-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
    line-height: 1.7;
    animation: fadeUp 0.6s 0.65s ease both;
  }

  /* PENDING PULSE */
  .pulse-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--orange);
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
    margin-right: 6px;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  @media(max-width: 480px) {
    .card, .container { padding-left: 16px; padding-right: 16px; }
    .container { padding-top: 28px; padding-bottom: 60px; }
  }
</style>
</head>
<body>

<!-- Topbar — injected by JS -->
<div id="topbar" class="topbar"></div>

<!-- Progress bar -->
<div class="progress-bar">
  <div class="progress-inner">
    <div class="progress-label">
      <span class="progress-step done">① Details Done</span>
      <span class="progress-step done">② WhatsApp Confirmed</span>
      <span class="progress-step active">③ Payment</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:100%"></div>
    </div>
  </div>
</div>

<div class="container" id="mainContainer">
  <!-- Content injected by JS -->
</div>

<script>
(function () {
  /* ─── 1. READ URL PARAMS ─────────────────────────────────────── */
  const params   = new URLSearchParams(window.location.search);
  const payment  = params.get('payment') || 'full';   // full | split | bank
  const name     = params.get('name')    || 'Client';
  const pkg      = params.get('package') || 'Standard Package';
  const amount   = params.get('amount')  || '180000'; // for bank transfer

  const WA_NUM   = '2348106334849';

  /* ─── 2. JOURNEY CONFIG ──────────────────────────────────────── */
  const journeys = {
    full: {
      topbarClass : 'green',
      topbarText  : '🎉 Full Payment Confirmed — GGS Global | Setup Begins Now',
      iconClass   : 'green',
      icon        : '✅',
      tagClass    : 'green',
      tagText     : 'Payment Confirmed',
      h1          : 'PAYMENT CONFIRMED\n<span class="accent-green">WELCOME TO GGS GLOBAL</span>',
      bodyMsg     : `Thank you <strong>${esc(name)}</strong> — your full payment of <strong>₦180,000</strong> has been received.<br>
                    Your PayPal setup slot is now <strong>officially confirmed and locked</strong>.<br>
                    Richard will begin your setup immediately.<br>
                    <strong>Expected delivery: within 72 hours from now.</strong>`,
      nextStepsClass: 'green',
      nextStepsLabel: '📋 What Happens Next',
      steps: [
        'Richard receives your payment confirmation <strong>automatically</strong>',
        'Your setup begins within the <strong>next few hours</strong>',
        'You receive your completed account details via <strong>WhatsApp within 72 hours</strong>',
        'Richard remains available on WhatsApp for <strong>30 days after delivery</strong>'
      ],
      extraCard: null,
      waMsg: `Hi Richard ✅ I just completed full payment of ₦180,000 for my PayPal setup. Here are my details: ${esc(name)} — ${esc(pkg)}`,
      pixelValue: 180000
    },
    split: {
      topbarClass : 'green',
      topbarText  : '✅ Split Payment Confirmed — GGS Global | Setup Begins Now',
      iconClass   : 'green',
      icon        : '✅',
      tagClass    : 'green',
      tagText     : 'Split Payment Confirmed',
      h1          : 'SPLIT PAYMENT CONFIRMED\n<span class="accent-green">SETUP BEGINS NOW</span>',
      bodyMsg     : `Thank you <strong>${esc(name)}</strong> — your first payment of <strong>₦100,000</strong> has been received.<br>
                    Your setup slot is <strong>confirmed and locked</strong>. Richard begins your setup immediately.<br>
                    <strong>Your remaining balance of ₦80,000 is due before final delivery.</strong>`,
      nextStepsClass: 'green',
      nextStepsLabel: '📋 What Happens Next',
      steps: [
        'Setup begins <strong>immediately</strong> on receipt of first payment',
        'Richard contacts you via WhatsApp to <strong>keep you updated</strong>',
        'Remaining <strong>₦80,000</strong> is collected before your account is handed over',
        'Full delivery within <strong>72 hours of first payment</strong>'
      ],
      extraCard: {
        cardClass : 'gold',
        labelClass: 'gold',
        labelText : '💰 Remaining Balance Due',
        html: `
          <div class="balance-row">
            <span class="balance-label">Balance Due</span>
            <span class="balance-value gold">₦80,000</span>
          </div>
          <div class="balance-row">
            <span class="balance-label">Due</span>
            <span class="balance-value white">Before final delivery</span>
          </div>
          <div class="balance-row">
            <span class="balance-label">Pay via PalmPay</span>
            <span class="balance-value white">8142717585 — Richard Ojukwu</span>
          </div>
          <div class="balance-row">
            <span class="balance-label">Or Flutterwave</span>
            <span class="balance-value white">flutterwave.com/pay/halfpay</span>
          </div>
        `
      },
      waMsg: `Hi Richard ✅ I just completed split payment of ₦100,000 for my PayPal setup. Here are my details: ${esc(name)} — ${esc(pkg)}`,
      pixelValue: 100000
    },
    bank: {
      topbarClass : 'orange',
      topbarText  : '⏳ Receipt Received — GGS Global | Verifying Your Payment',
      iconClass   : 'orange',
      icon        : '📩',
      tagClass    : 'orange',
      tagText     : 'Receipt Received',
      h1          : 'RECEIPT RECEIVED\n<span class="accent-orange">CONFIRMING YOUR PAYMENT</span>',
      bodyMsg     : `Thank you <strong>${esc(name)}</strong> — your receipt has been received and is being verified.<br>
                    Once your transfer is confirmed — which typically takes <strong>under 30 minutes</strong> — your setup begins immediately.<br>
                    <strong>Richard will send you a WhatsApp confirmation the moment payment is verified.</strong>`,
      nextStepsClass: 'orange',
      nextStepsLabel: '⏳ Payment Verification In Progress',
      steps: [
        '<strong>Richard is confirming your bank transfer now</strong> — this usually takes under 30 minutes',
        'You will receive a <strong>WhatsApp message confirming your slot</strong> is locked',
        'Setup begins <strong>immediately after verification</strong>',
        'Full delivery within <strong>72 hours of payment confirmation</strong>'
      ],
      extraCard: null,
      waMsg: `Hi Richard ✅ I just uploaded my bank transfer receipt for my PayPal setup. Here are my details: ${esc(name)} — ${esc(pkg)} — Amount transferred: ₦${esc(amount)}`,
      pixelValue: 180000
    }
  };

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  const j = journeys[payment] || journeys.full;

  /* ─── 3. FIRE FACEBOOK PIXEL PURCHASE ───────────────────────── */
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Purchase', {
      currency: 'NGN',
      value: j.pixelValue
    });
  }

  /* ─── 4. RENDER TOPBAR ───────────────────────────────────────── */
  const topbar = document.getElementById('topbar');
  topbar.className = `topbar ${j.topbarClass}`;
  topbar.textContent = j.topbarText;

  /* ─── 5. BUILD WHATSAPP URL ──────────────────────────────────── */
  const waUrl = `https://wa.me/${WA_NUM}?text=${encodeURIComponent(j.waMsg)}`;

  /* ─── 6. BUILD NEXT STEPS HTML ───────────────────────────────── */
  const stepsHtml = j.steps.map((s, i) => `
    <li>
      <span class="step-num ${j.nextStepsClass}">${i+1}</span>
      <span>${s}</span>
    </li>`).join('');

  /* ─── 7. BUILD EXTRA CARD HTML ───────────────────────────────── */
  const extraCardHtml = j.extraCard ? `
    <div class="card ${j.extraCard.cardClass}">
      <div class="card-label ${j.extraCard.labelClass}">${j.extraCard.labelText}</div>
      ${j.extraCard.html}
    </div>` : '';

  /* ─── 8. BUILD PENDING PULSE FOR BANK ───────────────────────── */
  const pendingBadge = payment === 'bank' ? `<span class="pulse-dot"></span>` : '';

  /* ─── 9. INJECT FULL HTML ────────────────────────────────────── */
  document.getElementById('mainContainer').innerHTML = `

    <div class="icon-circle ${j.iconClass}">${j.icon}</div>

    <div class="page-header">
      <div class="status-tag ${j.tagClass}">${pendingBadge}${j.tagText}</div>
      <h1>${j.h1.replace('\n', '<br>')}</h1>
      <div class="body-msg">${j.bodyMsg}</div>
    </div>

    <div class="card ${j.nextStepsClass === 'green' ? 'green' : 'orange'}">
      <div class="card-label ${j.nextStepsClass}">${j.nextStepsLabel}</div>
      <ul class="steps-list">${stepsHtml}</ul>
    </div>

    ${extraCardHtml}

    <div class="countdown-wrap">
      <div class="countdown-box">
        <span>Opening WhatsApp in</span>
        <span class="countdown-num" id="cdNum">5</span>
        <span>seconds…</span>
      </div>
    </div>

    <a href="${waUrl}" class="wa-btn" id="waBtn">
      <span style="font-size:22px;">💬</span>
      ${payment === 'bank' ? 'Message Richard to Confirm Your Receipt' : 'Send Payment Confirmation to Richard'}
    </a>

    <p class="wa-note">
      Opens WhatsApp — ${payment === 'bank' ? 'message Richard so he can verify and lock your slot' : 'send your confirmation so Richard can start your setup immediately'}<br>
      WhatsApp: +234 810 633 4849
    </p>
  `;

  /* ─── 10. COUNTDOWN & REDIRECT ───────────────────────────────── */
  let secs = 5;
  const cdEl = document.getElementById('cdNum');

  const timer = setInterval(() => {
    secs--;
    if (cdEl) cdEl.textContent = secs;
    if (secs <= 0) {
      clearInterval(timer);
      window.location.href = waUrl;
    }
  }, 1000);

  // If user taps WA button manually — clear timer
  document.getElementById('waBtn').addEventListener('click', () => clearInterval(timer));

})();
</script>

</body>
</html>
